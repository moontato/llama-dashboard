{% extends "base.html" %}
{% block title %}Settings - llama-dashboard{% endblock %}
{% block content %}
<div class="card">
  <h2>Settings</h2>
  <form method="post" action="{{ url_for('settings_save') }}">
    <fieldset>
      <legend>llama-server</legend>
      <div class="form-group">
        <label for="llama_server_bin">Binary Path</label>
        <input type="text" id="llama_server_bin" name="llama_server_bin" value="{{ settings.llama_server_bin }}" required>
      </div>
      <div class="form-group">
        <label for="llama_server_host">Host</label>
        <input type="text" id="llama_server_host" name="llama_server_host" value="{{ settings.llama_server_host }}">
      </div>
      <div class="form-group">
        <label for="llama_server_port">Port</label>
        <input type="number" id="llama_server_port" name="llama_server_port" value="{{ settings.llama_server_port }}">
      </div>
    </fieldset>

    <fieldset>
      <legend>Paths</legend>
      <div class="form-group">
        <label for="models_dir">Models Directory</label>
        <input type="text" id="models_dir" name="models_dir" value="{{ settings.models_dir }}">
      </div>
      <div class="form-group">
        <label for="mmproj_dir">MMProj Directory</label>
        <input type="text" id="mmproj_dir" name="mmproj_dir" value="{{ settings.mmproj_dir }}">
      </div>
      <div class="form-group">
        <label for="models_ini_path">models.ini Path</label>
        <input type="text" id="models_ini_path" name="models_ini_path" value="{{ settings.models_ini_path }}">
      </div>
      <div class="form-group">
        <label for="log_dir">Log Directory</label>
        <input type="text" id="log_dir" name="log_dir" value="{{ rel_log_dir }}">
      </div>
    </fieldset>

    <fieldset>
      <legend>Features</legend>
      <div class="form-group">
        <label><input type="checkbox" name="allow_multiple_servers" {% if settings.allow_multiple_servers %}checked{% endif %}> Allow multiple servers</label>
      </div>
    </fieldset>

    <fieldset>
      <legend>HuggingFace</legend>
      <div class="form-group">
        <label for="hf_token">Token (optional)</label>
        <input type="password" id="hf_token" name="hf_token" value="{{ settings.hf_token }}">
      </div>
    </fieldset>

    <fieldset>
      <legend>Boolean Flag Keys</legend>
      <div class="form-group">
        <label for="boolean_flag_keys">Comma-separated INI keys that become bare --flags when truthy</label>
        <input type="text" id="boolean_flag_keys" name="boolean_flag_keys"
               value="{{ settings.boolean_flag_keys|join(', ') }}"
               placeholder="flash-attn, kv-unified, swa-full">
        <p class="muted">Examples: flash-attn, kv-unified, swa-full</p>
      </div>
    </fieldset>

    <button type="submit" class="btn">Save Settings</button>
  </form>
</div>

<div class="card">
  <h2>Test Binary</h2>
  <form method="post" action="{{ url_for('settings_test_binary') }}" id="test-form">
    <div class="form-group">
      <label for="test-bin">Binary Path</label>
      <input type="text" id="test-bin" name="bin" value="{{ settings.llama_server_bin }}">
    </div>
    <button type="submit" class="btn">Test (--version)</button>
  </form>
  <div id="test-result" style="margin-top:12px;"></div>
</div>

<script>
document.getElementById('test-form').addEventListener('submit', function(e) {
  e.preventDefault();
  var form = this;
  var result = document.getElementById('test-result');
  result.innerHTML = '<p class="muted">Running...</p>';

  var formData = new FormData(form);
  fetch('{{ url_for("settings_test_binary") }}', {
    method: 'POST',
    body: formData
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.error) {
      result.innerHTML = '<pre class="flash flash-error">' + data.error + '</pre>';
    } else {
      var out = 'stdout: ' + (data.stdout || '(empty)') + '\n' +
                'stderr: ' + (data.stderr || '(empty)') + '\n' +
                'exit: ' + data.returncode;
      result.innerHTML = '<pre>' + out + '</pre>';
    }
  })
  .catch(function(err) {
    result.innerHTML = '<pre class="flash flash-error">' + err + '</pre>';
  });
});
</script>
{% endblock %}
