<tr>
  <td><a href="{{ url_for('preset_edit', name=p.name) }}">{{ p.name }}</a></td>
  <td><a href="{{ url_for('models') }}?q={{ p.model_basename() }}">{{ p.model_basename() }}</a></td>
  <td>{{ p.mmproj_basename() }}</td>
  <td>{{ p.ctx_size }}</td>
  <td>
    <a href="{{ url_for('preset_edit', name=p.name) }}" class="btn btn-sm">Edit</a>
    <form method="post" action="{{ url_for('preset_launch', name=p.name) }}" style="display:inline;">
      <button type="submit" class="btn btn-sm">Launch</button>
    </form>
    <form method="post" action="{{ url_for('preset_clone', name=p.name) }}" style="display:inline;">
      <button type="submit" class="btn btn-sm">Clone</button>
    </form>
    <form method="post" action="{{ url_for('preset_delete', name=p.name) }}" style="display:inline;"
          onsubmit="var el=document.getElementById('del-{{ p.name }}'); return el.value==='{{ p.name }}';">
      <input type="text" id="del-{{ p.name }}" placeholder="Type name to confirm" style="width:120px;font-size:0.8rem;" required>
      <button type="submit" class="btn btn-sm btn-danger">Delete</button>
    </form>
  </td>
</tr>
